<!DOCTYPE html>
<html lang="ja">
<head>

  <style>
    :root {
      --bg: #0f1115;

    body {
      margin: 0;
      min-height: 100vh;

      color: var(--text);

      line-height: 1.6;

      padding: 1rem;
      border: 1px dashed rgba(255,255,255,0.2);
      border-radius: 8px;
      color: rgba(255,255,255,0.75);

<body>
  <div class="wrap">
    <h1>テンプレプロトタイプ</h1>

    <div class="hint">
      ブラウザで確認: リポジトリルートからローカルサーバを立てるか、この HTML を直接開いてください。<br />
      本体への取り込み後は <code>buildHtml</code> が正です（プレビューとサーバーで二重実装に注意）。
